<?plantuml 1.2026.2?><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="DESCRIPTION" height="1632px" preserveAspectRatio="none" style="width:4293px;height:1632px;background:#FFFFFF;" version="1.1" viewBox="0 0 4293 1632" width="4293px" zoomAndPan="magnify"><title>&lt;size:24&gt;Component View: UnrealAiEditor Plugin - Retrieval Service (Optional)&lt;/size&gt;
&lt;size:24&gt;Index rebuild (corpus rationale).
Policy from plugin_settings: whitelist extensions, root preset (minimal/standard/extended),
per-rebuild caps/throttle to bound API, CPU, and disk.
Build commits in priority waves (project Source, plugin Source, Config+docs, Content, virtual);
after each wave chunks persist via UpsertIncremental; deletions deferred to final transaction;
optional indexFirstWaveTimeBudgetSeconds for early P0 commits.
Filesystem corpus: UTF-8 text for allow-listed paths only; binary Content not read as strings.
Asset Registry: deterministic metadata shards (path, class, package) without .uasset bytes.
Blueprint corpus: registry-derived feature lines.
Memory corpus: optional, default-off (tagged memory stays primary).
Chat history is out of scope: `conversation.json` already feeds the harness; duplicating it in the index adds cost and overlap.&lt;/size&gt;</title><defs/><g><g class="title" data-source-line="1"><text fill="#444444" font-family="sans-serif" font-size="24" font-weight="bold" lengthAdjust="spacing" textLength="940.5234" x="1669.4902" y="32.2773">Component View: UnrealAiEditor Plugin - Retrieval Service (Optional)</text><text fill="#444444" font-family="sans-serif" font-size="24" font-weight="bold" lengthAdjust="spacing" textLength="440.1914" x="1919.6563" y="60.2148">Index rebuild (corpus rationale).</text><text fill="#444444" font-family="sans-serif" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="724.4385" x="1777.5327" y="78.8701">Policy from plugin_settings: whitelist extensions, root preset (minimal/standard/extended),</text><text fill="#444444" font-family="sans-serif" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="426.3984" x="1926.5527" y="95.167">per-rebuild caps/throttle to bound API, CPU, and disk.</text><text fill="#444444" font-family="sans-serif" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="750.7705" x="1764.3667" y="111.4639">Build commits in priority waves (project Source, plugin Source, Config+docs, Content, virtual);</text><text fill="#444444" font-family="sans-serif" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="746.3477" x="1766.5781" y="127.7607">after each wave chunks persist via UpsertIncremental; deletions deferred to final transaction;</text><text fill="#444444" font-family="sans-serif" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="528.1855" x="1875.6592" y="144.0576">optional indexFirstWaveTimeBudgetSeconds for early P0 commits.</text><text fill="#444444" font-family="sans-serif" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="736.2646" x="1771.6196" y="160.3545">Filesystem corpus: UTF-8 text for allow-listed paths only; binary Content not read as strings.</text><text fill="#444444" font-family="sans-serif" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="729.9551" x="1774.7744" y="176.6514">Asset Registry: deterministic metadata shards (path, class, package) without .uasset bytes.</text><text fill="#444444" font-family="sans-serif" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="380.3037" x="1949.6001" y="192.9482">Blueprint corpus: registry-derived feature lines.</text><text fill="#444444" font-family="sans-serif" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="552.7813" x="1863.3613" y="209.2451">Memory corpus: optional, default-off (tagged memory stays primary).</text><text fill="#444444" font-family="sans-serif" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="1050.9229" x="1614.2905" y="225.542">Chat history is out of scope: `conversation.json` already feeds the harness; duplicating it in the index adds cost and overlap.&lt;/size&gt;</text></g><!--cluster UnrealAiEditor Plugin\n<size:16>[Software System]</size>--><g class="cluster" data-qualified-name="UnrealAiEditor Plugin.n.size.16..Software System...size." data-source-line="113" id="ent0003"><rect fill="#FFFFFF" height="1378" rx="2.5" ry="2.5" style="stroke:#10B981;stroke-width:2;" width="3837" x="7" y="248.0039"/><text fill="#1168BD" font-family="sans-serif" font-size="24" font-weight="bold" lengthAdjust="spacing" textLength="291.2578" x="1779.8711" y="272.2813">UnrealAiEditor Plugin</text><text fill="#1168BD" font-family="sans-serif" font-size="16" font-weight="bold" lengthAdjust="spacing" textLength="168.2891" x="1841.3555" y="292.793">[Software System]</text></g><!--cluster Retrieval Service (Optional)\n<size:16>[Container: C++]</size>--><g class="cluster" data-qualified-name="UnrealAiEditor Plugin.n.size.16..Software System...size..Retrieval Service .Optional..n.size.16..Container. C.....size." data-source-line="114" id="ent00