&lt;size:24&gt;Tool surface pipeline (dispatch eligibility): `UnrealAiToolSurfacePipeline` composes query shaping, BM25 lexical rank, editor domain bias, optional session usage prior, dynamic K, then tiered markdown from `FUnrealAiToolCatalog`. **Not** the docs/project vector index (`Retrieval Service`). See `docs/tooling/tools-expansion.md`.&lt;/size&gt;</title><defs/><g><g class="title" data-source-line="1"><text fill="#444444" font-family="sans-serif" font-size="24" font-weight="bold" lengthAdjust="spacing" textLength="786.2461" x="1789.4746" y="32.2773">Component View: UnrealAiEditor Plugin - Tooling Runtime</text><text fill="#444444" font-family="sans-serif" font-size="24" font-weight="bold" lengthAdjust="spacing" textLength="3152.3672" x="10" y="60.2148">Tool surface pipeline (dispatch eligibility): `UnrealAiToolSurfacePipeline` composes query shaping, BM25 lexical rank, editor domain bias, optional session usage prior, dynamic K, then tiered markdown from `FUnrealAiToolCatalog`.</text><text fill="#444444" font-family="sans-serif" font-size="24" font-weight="bold" lengthAdjust="spacing" textLength="48.0469" x="3170.7227" y="60.2148">Not</text><text fill="#444444" font-family="sans-serif" font-size="24" font-weight="bold" lengthAdjust="spacing" textLength="1128.0703" x="3227.125" y="60.2148">the docs/project vector index (`Retrieval Service`). See `docs/tooling/tools-expansion.md`.</text></g><!--cluster UnrealAiEditor Plugin\n<size:16>[Software System]</size>--><g class="cluster" data-qualified-name="UnrealAiEditor Plugin.n.size.16..Software System...size." data-source-line="118" id="ent0002"><rect fill="#FFFFFF" height="1260" rx="2.5" ry="2.5" style="stroke:#10B981;stroke-width:2;" width="3069" x="454.8899" y="85.0352"/><text fill="#1168BD" font-family="sans-serif" font-size="24" font-weight="bold" lengthAdjust="spacing" textLength="291.2578" x="1843.761" y="109.3125">UnrealAiEditor Plugin</text><text fill="#1168BD" font-family="sans-serif" font-size="16" font