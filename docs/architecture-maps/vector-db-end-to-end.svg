&lt;size:24&gt;Optional local vector index (settings-driven whitelist, root presets, caps).
Corpora: filesystem text, Asset Registry shards, Blueprint features,
optional memory chunks. SQLite + manifest; BYOK embeddings; phased wave commits
for faster time-to-first-hit; merged into context ranker.
Does not index raw binary assets or full chat transcripts.&lt;/size&gt;</title><defs/><g><g class="title" data-source-line="1"><text fill="#444444" font-family="sans-serif" font-size="24" font-weight="bold" lengthAdjust="spacing" textLength="515.0977" x="1002.4512" y="32.2773">Container View: UnrealAiEditor Plugin</text><text fill="#444444" font-family="sans-serif" font-size="24" font-weight="bold" lengthAdjust="spacing" textLength="998.6953" x="760.6523" y="60.2148">Optional local vector index (settings-driven whitelist, root presets, caps).</text><text fill="#444444" font-family="sans-serif" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="534.707" x="992.6465" y="78.8701">Corpora: filesystem text, Asset Registry shards, Blueprint features,</text><text fill="#444444" font-family="sans-serif" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="688.9395" x="915.5303" y="95.167">optional memory chunks. SQLite + manifest; BYOK embeddings; phased wave commits</text><text fill="#444444" font-family="sans-serif" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="436.7549" x="1041.6226" y="111.4639">for faster time-to-first-hit; merged into context ranker.</text><text fill="#444444" font-family="sans-serif" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="510.3506" x="1004.8247" y="127.7607">Does not index raw binary assets or full chat transcripts.&lt;/size&gt;</text></g><!--cluster UnrealAiEditor Plugin\n<size:16>[Software System]</size>--><g class="cluster" data-qualified-name="UnrealAiEditor Plugin.n.size.16..Software System...size." data-source-line="127" id="ent0004"><rect fill="#FFFFFF" height="1374" rx="2.5" ry="2.5" style="stroke:#10B981;stroke-width:2;" width="1112" x="7" y="150.2227"/><text fill="#1168BD" font-family="sans-serif" font-size="24" font-weight="bold" lengthAdjust="spacing" textLength="291.2578" x="417.3711" y="174.5">UnrealAiEditor Plugin</text><text fill="#1168BD" font-fami