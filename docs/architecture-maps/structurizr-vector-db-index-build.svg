<?plantuml 1.2026.2?><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="DESCRIPTION" height="1177px" preserveAspectRatio="none" style="width:11120px;height:1177px;background:#FFFFFF;" version="1.1" viewBox="0 0 11120 1177" width="11120px" zoomAndPan="magnify"><title>&lt;size:24&gt;Component View: UnrealAiEditor Plugin - Retrieval Service (Optional)&lt;/size&gt;
&lt;size:24&gt;Index rebuild (corpus rationale): Policy from plugin_settings retrieval JSON&#8212;whitelist extensions, root preset (minimal/standard/extended), and per-rebuild caps/throttle to bound API + CPU/disk. Filesystem corpus ingests UTF-8 text only for allow-listed paths (code/docs/config JSON sidecars, etc.); binary Content assets are not read as strings. Asset Registry corpus adds deterministic metadata shards (object path, class, package) for names/structure without .uasset bytes. Blueprint corpus adds registry-derived feature lines. Memory corpus is optional and default-off so tagged memory remains primary. Chat history is out of scope: conversation.json is already the bounded transcript input to the harness/context packer; duplicating it in the vector index would add cost and overlap the deterministic pipeline.&lt;/size&gt;</title><defs/><g><g class="title" data-source-line="1"><text fill="#444444" font-family="sans-serif" font-size="24" font-weight="bold" lengthAdjust="spacing" textLength="940.5234" x="5086.0762" y="32.2773">Component View: UnrealAiEditor Plugin - Retrieval Service (Optional)</text><text fill="#444444" font-family="sans-serif" font-size="24" font-weight="bold" lengthAdjust="spacing" textLength="11092.6758" x="10" y="60.2148">Index rebuild (corpus rationale): Policy from plugin_settings retrieval JSON&#8212;whitelist extensions, root preset (minimal/standard/extended), and per-rebuild caps/throttle to bound API + CPU/disk. Filesystem corpus ingests UTF-8 text only for allow-listed paths (code/docs/config JSON sidecars, etc.); binary Content assets are not read as strings. Asset Registry corpus adds deterministic metadata shards (object path, class, package) for names/structure without .uasset bytes. Blueprint corpus adds registry-derived feature lines. Memory corpus is optional and default-off so tagged memory remains primary. Chat history is out of scope: conversation.json is already the bounded transcript input to the harness/context packer; duplicating it in the vector index would add cost and overlap the deterministic pipeline.</text></g><!--cluster UnrealAiEditor Plugin\n<size:16>[Software System]</size>--><g class="cluster" data-qualified-name="UnrealAiEditor Plugin.n.size.16..Software System...size." data-source-line="113" id="ent0003"><rect fill="#FFFFFF" height="1086" rx="2.5" ry="2.5" style="stroke:#10B981;stroke-width:2;" width="3845" x="3419.5859" y="85.0352"/><text fill="#1168BD" font-family="sans-serif" font-size="24" font-weight="bold" lengthAdjust="spacing" textLength="291.2578" x="5196.457" y="109.3125">UnrealAiEditor Plugin</text><text fill="#1168BD" font-family="sans-serif" font-size="16" font-weight="bold" lengthAdjust="spacing" textLength="168.2891" x="5257.9414" y="129.8242">[Software System]</text></g><!--cluster Retrieval Service (Optional)\n<size:16>[Container: C++]</size>--><g class="cluster" data-qualified-name="UnrealAiEditor Plugin.n.size.16..Software System...size..Retrieval Service .Optional..n.size.16..Container. C.....size." data-source-line="114" id="ent0004"><rect fill="#FFFFFF" height="989" rx="2.5" ry="2.5" style="stroke:#8B5CF6;stroke-width:2;" width="3007" x="3851.5859" y="158.0352"/><text fill="#438DD5" font-family="sans-serif" font-size="24" font-weight="bold" lengthAdjust="spacing" textLength="376.3359" x="5166.918" y="182.3125">Retrieval Service (Optional)</text><text fill="#438DD5" font-family="sans-serif" font-size="16" font-weight="bold" lengthAdjust="spacing" textLength="153.3359" x="5278.418" y="202.8242">[Container: C++]</text></g><!--entity UnrealAiEditorPlugin.MemoryService--><g class="entity" data-qualified-name="UnrealAiEditor Plugin.n.size.16..Software System...size..UnrealAiEditorPlugin.MemoryService" data-source-line="126" id="ent0014"><rect fill="#ECFDF5" height="180.6406" rx="10" ry="10" style="stroke:#10B981;stroke-width:2;" width="373.1914" x="6875.0859" y="893.0352"/><text fill="#065F46" font-family="sans-serif" font-size="26" font-weig