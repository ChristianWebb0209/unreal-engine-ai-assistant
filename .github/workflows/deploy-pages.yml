name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - README.md
      - ARCHITECTURE_MAPS.md
      - architecture.svg
      - docs/architecture-maps/**
      - .github/workflows/deploy-pages.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Prepare pages source
        shell: bash
        run: |
          rm -rf .pages-src _site
          mkdir -p .pages-src/docs .pages-src/_includes
          cp README.md .pages-src/index.md
          cp ARCHITECTURE_MAPS.md .pages-src/architecture-maps.md
          cp architecture.svg .pages-src/architecture.svg
          cp -R docs/architecture-maps .pages-src/docs/architecture-maps
          cat > .pages-src/_config.yml <<'EOF'
          title: Unreal AI Editor
          description: Unreal AI Editor documentation pages
          markdown: kramdown
          theme: minima
          EOF
          cat > .pages-src/_includes/head-custom.html <<'EOF'
          <style>
          img { max-width: 100%; height: auto; }
          </style>
          EOF

      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: .pages-src
          destination: _site

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
